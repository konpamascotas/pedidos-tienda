<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Escaneado</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; }
        .tabla-container { background: white; border-radius: 8px; overflow-x: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #28a745; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        .status { text-align: center; margin-bottom: 10px; color: #666; }
   
.navbar {
    display: flex;
    justify-content: space-around;
    background-color: #333;
    padding: 10px 0;
    position: sticky;
    top: 0;
    z-index: 1000;
    margin-bottom: 20px;
}

.nav-link {
    color: white;
    text-decoration: none;
    font-size: 14px;
    font-weight: bold;
    padding: 8px 12px;
    border-radius: 4px;
}

/* Clase para resaltar la página activa */
.nav-link.active {
    background-color: #28a745;
} </style>
</head>
<body>
    <h2>Artículos en Almacén</h2>
    <p id="estado" class="status">Cargando lista...</p>
    <nav class="navbar">
    <a href="index.html" class="nav-link" id="link-home">Inicio</a>
    <a href="escaner.html" class="nav-link" id="link-scan">Escáner</a>
    <a href="inventario.html" class="nav-link" id="link-list">Inventario</a>
</nav>
    <div class="tabla-container">
        <table id="tabla-datos">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cant.</th>
                    <th>EAN</th>
                </tr>
            </thead>
            <tbody>
                <!-- Aquí se insertarán los datos -->
            </tbody>
        </table>
    </div>

    <script>
        // PEGA AQUÍ LA NUEVA URL DE TU SCRIPT DE GOOGLE
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxLRz9rbWr7pHk9qfBPAfZykq4gt65cjYzcy1SCzWF6WzCQ8WOIsoAoETSQ7pT_6n1xUg/exec";

        async function obtenerDatos() {
            try {
                const respuesta = await fetch(SCRIPT_URL);
                const articulos = await respuesta.json();
                const cuerpoTabla = document.querySelector("#tabla-datos tbody");
                
                cuerpoTabla.innerHTML = ""; // Limpiar tabla

                articulos.reverse().forEach(art => { // reverse() para ver lo último primero
                    const fila = `<tr>
                        <td>${art.nombre}</td>
                        <td>${art.unidades}</td>
                        <td>${art.ean}</td>
                    </tr>`;
                    cuerpoTabla.innerHTML += fila;
                });
                
                document.getElementById("estado").innerText = "Sincronizado con Google Sheets";
            } catch (error) {
                document.getElementById("estado").innerText = "Error al cargar datos";
            }
        }

        obtenerDatos();
// Detecta la página actual y añade la clase 'active' al enlace correspondiente
const path = window.location.pathname;
if (path.includes("index")) document.getElementById("link-home").classList.add("active");
if (path.includes("escaner")) document.getElementById("link-scan").classList.add("active");
if (path.includes("inventario")) document.getElementById("link-list").classList.add("active");
    </script>
</body>
</html>
